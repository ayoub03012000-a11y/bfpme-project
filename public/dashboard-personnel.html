<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personnel Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg-main: linear-gradient(135deg, #f6f8fc 0%, #eef2f9 100%);
      --text-main: #1f3156;
      --panel-bg: #ffffff;
      --panel-border: #e8edf5;
      --card-bg: #fbfcff;
      --card-border: #e4eaf4;
      --title-color: #14357d;
      --muted: #6b7892;
      --muted-2: #7b88a2;
      --btn-primary: #14357d;
      --btn-primary-hover: #0f2c68;
      --btn-danger: #c62828;
      --btn-danger-hover: #9f1f1f;
      --btn-success: #0b8f4d;
      --btn-success-hover: #08723d;
      --empty-bg: #f8fafd;
      --empty-border: #d7dfeb;
      --toast-shadow: rgba(0, 0, 0, 0.18);
    }

    body.dark {
      --bg-main: linear-gradient(135deg, #0f172a 0%, #111827 100%);
      --text-main: #e2e8f0;
      --panel-bg: #1e293b;
      --panel-border: #334155;
      --card-bg: #172131;
      --card-border: #334155;
      --title-color: #93c5fd;
      --muted: #cbd5e1;
      --muted-2: #94a3b8;
      --empty-bg: #172131;
      --empty-border: #334155;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg-main);
      color: var(--text-main);
      transition: background 0.3s ease, color 0.3s ease;
    }

    .container {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 20px 50px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
      animation: fadeDown 0.45s ease;
    }

    .topbar-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .page-title {
      margin: 0;
      font-size: 34px;
      color: var(--title-color);
      font-weight: 800;
    }

    .welcome-text {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 16px;
    }

    .btn {
      border: none;
      padding: 11px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      transition: 0.2s ease;
      font-size: 14px;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn-primary {
      background: var(--btn-primary);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--btn-primary-hover);
    }

    .btn-danger {
      background: var(--btn-danger);
      color: #fff;
    }

    .btn-danger:hover {
      background: var(--btn-danger-hover);
    }

    .btn-success {
      background: var(--btn-success);
      color: #fff;
    }

    .btn-success:hover {
      background: var(--btn-success-hover);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--panel-bg);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 10px 26px rgba(22, 40, 84, 0.07);
      border: 1px solid var(--panel-border);
      transition: 0.25s ease;
      animation: fadeUp 0.45s ease;
    }

    .stat-card:hover {
      transform: translateY(-4px);
    }

    .stat-label {
      margin: 0 0 10px;
      color: var(--muted-2);
      font-size: 14px;
      font-weight: 700;
    }

    .stat-value {
      margin: 0;
      font-size: 30px;
      font-weight: 800;
      color: var(--title-color);
    }

    .sections-grid {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 20px;
      align-items: start;
    }

    .panel,
    .chart-panel {
      background: var(--panel-bg);
      border-radius: 20px;
      padding: 22px;
      box-shadow: 0 10px 26px rgba(22, 40, 84, 0.07);
      border: 1px solid var(--panel-border);
      animation: fadeUp 0.55s ease;
    }

    .panel h2,
    .chart-panel h2 {
      margin: 0 0 14px;
      color: var(--title-color);
      font-size: 22px;
      font-weight: 800;
    }

    .cards-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 16px;
      transition: 0.22s ease;
      animation: fadeUp 0.4s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 24px rgba(20, 53, 125, 0.08);
    }

    .card h3 {
      margin: 0 0 8px;
      font-size: 18px;
      color: var(--title-color);
    }

    .card p {
      margin: 6px 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 14px;
    }

    .card-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
    }

    .badge-pending {
      background: #fff3cd;
      color: #856404;
    }

    .badge-active {
      background: #d4edda;
      color: #155724;
    }

    .badge-refused {
      background: #fde2e2;
      color: #b42318;
    }

    .badge-accepted {
      background: #dbf4e6;
      color: #0f7a43;
    }

    .empty-box {
      padding: 18px;
      border-radius: 14px;
      background: var(--empty-bg);
      color: var(--muted);
      font-size: 14px;
      border: 1px dashed var(--empty-border);
    }

    .section-subtitle {
      margin: -2px 0 16px;
      color: var(--muted-2);
      font-size: 14px;
    }

    .reason-box {
      margin-top: 10px;
      padding: 10px 12px;
      background: #fff1f1;
      border: 1px solid #ffd5d5;
      border-radius: 10px;
      color: #b42318;
      font-size: 13px;
      font-weight: 700;
    }

    .file-link {
      display: inline-block;
      margin-top: 6px;
      color: var(--title-color);
      font-weight: 700;
      text-decoration: none;
    }

    .file-link:hover {
      text-decoration: underline;
    }

    .charts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 20px;
    }

    canvas {
      width: 100% !important;
      height: 320px !important;
    }

    #toast {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 14px 18px;
      border-radius: 10px;
      color: white;
      font-weight: bold;
      opacity: 0;
      transform: translateY(-20px);
      transition: 0.3s;
      z-index: 999;
      box-shadow: 0 10px 24px var(--toast-shadow);
      pointer-events: none;
    }

    #toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast-success {
      background: #16a34a;
    }

    .toast-error {
      background: #dc2626;
    }

    .toast-info {
      background: #14357d;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeDown {
      from {
        opacity: 0;
        transform: translateY(-12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 1024px) {
      .stats-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .sections-grid,
      .charts-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .container {
        padding: 18px 12px 36px;
      }

      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }

      .topbar-actions {
        width: 100%;
      }

      .topbar-actions .btn {
        flex: 1;
      }

      .page-title {
        font-size: 28px;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .panel,
      .chart-panel {
        padding: 16px;
        border-radius: 16px;
      }

      .card {
        padding: 14px;
      }

      .card-actions {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="topbar">
      <div>
        <h1 class="page-title">🏦 Espace Personnel</h1>
        <p id="text" class="welcome-text"></p>
      </div>

      <div class="topbar-actions">
        <button class="btn" onclick="toggleDarkMode()">🌙 Mode</button>
        <button class="btn btn-primary" onclick="logout()">Déconnexion</button>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <p class="stat-label">Clients en attente</p>
        <p class="stat-value" id="pendingUsersCount">0</p>
      </div>

      <div class="stat-card">
        <p class="stat-label">Total dossiers</p>
        <p class="stat-value" id="totalDossiersCount">0</p>
      </div>

      <div class="stat-card">
        <p class="stat-label">Dossiers acceptés</p>
        <p class="stat-value" id="acceptedDossiersCount">0</p>
      </div>

      <div class="stat-card">
        <p class="stat-label">Dossiers refusés</p>
        <p class="stat-value" id="refusedDossiersCount">0</p>
      </div>
    </div>

    <div class="sections-grid">
      <div class="panel">
        <h2>Utilisateurs en attente</h2>
        <p class="section-subtitle">Validation des nouveaux comptes clients</p>
        <div id="usersList" class="cards-list"></div>
      </div>

      <div class="panel">
        <h2>Liste des dossiers</h2>
        <p class="section-subtitle">Consultation, validation et refus des dossiers</p>
        <div id="list" class="cards-list"></div>
      </div>
    </div>

    <div class="charts-grid">
      <div class="chart-panel">
        <h2>📊 Statistiques dossiers</h2>
        <canvas id="statusChart"></canvas>
      </div>

      <div class="chart-panel">
        <h2>📈 Evolution dossiers</h2>
        <canvas id="lineChart"></canvas>
      </div>
    </div>

  </div>

  <div id="toast"></div>

  <script>
  const API_URL = "https://bfpme-1bkz.onrender.com";

  const user = JSON.parse(localStorage.getItem("user"));
  const token = localStorage.getItem("token");
  const socket = io(API_URL);

  let statusChart = null;
  let lineChart = null;

  if (!user || !token) {
    window.location.href = "login.html";
  }

  if (localStorage.getItem("dark") === "true") {
    document.body.classList.add("dark");
  }

  document.getElementById("text").innerText =
    "Bienvenue " + (user.first_name || "Personnel") + " (Personnel)";

  function logout() {
    localStorage.removeItem("user");
    localStorage.removeItem("token");
    window.location.href = "login.html";
  }

  function showToast(msg, type = "success") {
    const t = document.getElementById("toast");
    t.innerText = msg;
    t.className = "show toast-" + type;

    setTimeout(() => {
      t.className = "";
    }, 3000);
  }

  function toggleDarkMode() {
    document.body.classList.toggle("dark");
    localStorage.setItem("dark", document.body.classList.contains("dark"));
  }

  function setStats(data, pendingUsers) {
    const total = data.length;
    const accepted = data.filter(d => d.status === "accepté").length;
    const refused = data.filter(d => d.status === "refusé").length;

    document.getElementById("pendingUsersCount").innerText = pendingUsers;
    document.getElementById("totalDossiersCount").innerText = total;
    document.getElementById("acceptedDossiersCount").innerText = accepted;
    document.getElementById("refusedDossiersCount").innerText = refused;
  }

  function getDossierBadgeClass(status) {
    if (status === "accepté") return "badge badge-accepted";
    if (status === "refusé") return "badge badge-refused";
    return "badge badge-pending";
  }

  function renderCharts(dossiers) {
    let accepted = 0;
    let refused = 0;
    let pending = 0;
    const days = {};

    dossiers.forEach(d => {
      if (d.status === "accepté") accepted++;
      else if (d.status === "refusé") refused++;
      else pending++;

      const date = new Date(d.createdAt || Date.now()).toLocaleDateString();
      if (!days[date]) days[date] = 0;
      days[date]++;
    });

    if (statusChart) statusChart.destroy();
    if (lineChart) lineChart.destroy();

    statusChart = new Chart(document.getElementById("statusChart"), {
      type: "doughnut",
      data: {
        labels: ["Accepté", "Refusé", "En attente"],
        datasets: [{
          data: [accepted, refused, pending],
          backgroundColor: ["#22c55e", "#ef4444", "#facc15"]
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false
      }
    });

    lineChart = new Chart(document.getElementById("lineChart"), {
      type: "line",
      data: {
        labels: Object.keys(days),
        datasets: [{
          label: "Dossiers",
          data: Object.values(days),
          borderColor: "#3b82f6",
          backgroundColor: "rgba(59,130,246,0.12)",
          fill: true,
          tension: 0.35
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false
      }
    });
  }

  function loadDossiers() {
    fetch(`${API_URL}/api/dossiers`, {
      headers: { Authorization: "Bearer " + token }
    })
      .then(res => {
        if (res.status === 401 || res.status === 403) {
          logout();
          return;
        }
        return res.json();
      })
      .then(data => {
        if (!data) return;

        const container = document.getElementById("list");
        container.innerHTML = "";

        if (data.length === 0) {
          container.innerHTML = `<div class="empty-box">Aucun dossier disponible pour le moment.</div>`;
          setStats([], parseInt(document.getElementById("pendingUsersCount").innerText || "0", 10));
          renderCharts([]);
          return;
        }

        data.forEach(d => {
          container.innerHTML += `
            <div class="card">
              <h3>${d.title}</h3>
              <p>${d.description}</p>
              <p><b>Email client:</b> ${d.userEmail}</p>
              <p>
                <b>Status:</b>
                <span class="${getDossierBadgeClass(d.status)}">${d.status}</span>
              </p>

              ${d.file ? `<a class="file-link" href="${API_URL}/uploads/${d.file}" target="_blank">Voir fichier</a>` : ""}
              ${d.reason ? `<div class="reason-box"><b>Raison:</b> ${d.reason}</div>` : ""}

              <div class="card-actions">
                <button class="btn btn-success" onclick="accept('${d._id}')">✅ Accepter</button>
                <button class="btn btn-danger" onclick="refuse('${d._id}')">❌ Refuser</button>
              </div>
            </div>
          `;
        });

        const pendingUsers = parseInt(document.getElementById("pendingUsersCount").innerText || "0", 10);
        setStats(data, pendingUsers);
        renderCharts(data);
      })
      .catch(() => {
        document.getElementById("list").innerHTML =
          `<div class="empty-box">❌ Erreur lors du chargement des dossiers.</div>`;
        showToast("Erreur lors du chargement des dossiers", "error");
      });
  }

  function accept(id) {
    fetch(`${API_URL}/api/dossiers/${id}`, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json",
        Authorization: "Bearer " + token
      },
      body: JSON.stringify({ status: "accepté" })
    })
      .then(res => {
        if (res.status === 401 || res.status === 403) {
          logout();
          return;
        }
        return res.json();
      })
      .then(data => {
        if (!data) return;
        showToast("Dossier accepté ✅", "success");
        loadDossiers();
      })
      .catch(() => showToast("Erreur lors de l'acceptation", "error"));
  }

  function refuse(id) {
    const reason = prompt("Pourquoi refuser ce dossier ?");

    if (!reason || !reason.trim()) {
      return;
    }

    fetch(`${API_URL}/api/dossiers/${id}`, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json",
        Authorization: "Bearer " + token
      },
      body: JSON.stringify({
        status: "refusé",
        reason: reason.trim()
      })
    })
      .then(res => {
        if (res.status === 401 || res.status === 403) {
          logout();
          return;
        }
        return res.json();
      })
      .then(data => {
        if (!data) return;
        showToast("Dossier refusé ❌", "error");
        loadDossiers();
      })
      .catch(() => showToast("Erreur lors du refus", "error"));
  }

  function loadUsers() {
    fetch(`${API_URL}/api/users`, {
      headers: { Authorization: "Bearer " + token }
    })
      .then(res => {
        if (res.status === 401 || res.status === 403) {
          logout();
          return;
        }
        return res.json();
      })
      .then(data => {
        if (!data) return;

        const container = document.getElementById("usersList");
        container.innerHTML = "";

        const pendingUsers = data.filter(u => u.role === "client" && u.status === "pending");
        document.getElementById("pendingUsersCount").innerText = pendingUsers.length;

        if (pendingUsers.length === 0) {
          container.innerHTML = `<div class="empty-box">Aucun client en attente.</div>`;
          return;
        }

        pendingUsers.forEach(u => {
          container.innerHTML += `
            <div class="card">
              <p><b>${u.first_name} ${u.last_name}</b></p>
              <p>${u.email}</p>
              <span class="badge badge-pending">En attente</span>

              <div class="card-actions">
                <button class="btn btn-primary" onclick="activateUser('${u._id}')">Activer</button>
              </div>
            </div>
          `;
        });
      })
      .catch(() => {
        document.getElementById("usersList").innerHTML =
          `<div class="empty-box">Erreur lors du chargement des utilisateurs.</div>`;
        showToast("Erreur lors du chargement des utilisateurs", "error");
      });
  }

  function activateUser(id) {
    fetch(`${API_URL}/api/users/${id}/activate`, {
      method: "PUT",
      headers: { Authorization: "Bearer " + token }
    })
      .then(res => {
        if (res.status === 401 || res.status === 403) {
          logout();
          return;
        }
        return res.json();
      })
      .then(data => {
        if (!data) return;
        showToast("Compte activé ✅", "success");
        loadUsers();
      })
      .catch(() => showToast("Erreur lors de l'activation", "error"));
  }

  socket.on("new_dossier", () => {
    showToast("Nouveau dossier reçu 📥", "info");
    loadDossiers();
  });

  socket.on("user_activated", () => {
    loadUsers();
  });

  socket.on("dossier_updated", () => {
    loadDossiers();
  });

  loadDossiers();
  loadUsers();

  setInterval(() => {
    loadDossiers();
    loadUsers();
  }, 5000);
</script>
</body>
</html>
